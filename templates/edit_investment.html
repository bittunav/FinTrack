{% extends "base.html" %}
{% block title %}Edit Investment — FinTrack{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Edit Investment</h1>
  <p class="page-subtitle">Update investment details</p>
</div>
<div class="card" style="max-width:560px;">
  <form method="POST" action="{{ url_for('edit_investment', inv_id=inv.id) }}">
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label>Investment Name</label>
        <input type="text" name="name" value="{{ inv.name }}" required>
      </div>
      <div class="form-group">
        <label>Type</label>
        <select name="type" required>
          {% for t in investment_types %}
          <option {% if t == inv.type %}selected{% endif %}>{{ t }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" name="date" value="{{ inv.date }}" required>
      </div>
      <div class="form-group">
        <label>Amount Invested ({{ currency }})</label>
        <input type="number" name="amount_invested" step="0.01" value="{{ inv.amount_invested }}" required>
      </div>
      <div class="form-group">
        <label>Current Value ({{ currency }})</label>
        <input type="number" name="current_value" step="0.01" value="{{ inv.current_value }}" required>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>Notes</label>
        <textarea name="notes">{{ inv.notes or '' }}</textarea>
      </div>
    </div>
    <div style="margin-top:20px;display:flex;gap:10px;">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{{ url_for('investments') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
