{% extends "base.html" %}
{% block title %}Edit Expense — FinTrack{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Edit Expense</h1>
  <p class="page-subtitle">Update the details below</p>
</div>
<div class="card" style="max-width:540px;">
  <form method="POST" action="{{ url_for('edit', expense_id=expense.id) }}">
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label>Description</label>
        <input type="text" name="description" value="{{ expense.description }}" required>
      </div>
      <div class="form-group">
        <label>Amount ({{ currency }})</label>
        <input type="number" name="amount" step="0.01" value="{{ expense.amount }}" required>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select name="category" required>
          {% for c in categories %}
          <option {% if c == expense.category %}selected{% endif %}>{{ c }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" name="date" value="{{ expense.date }}" required>
      </div>
    </div>
    <div style="margin-top:20px;display:flex;gap:10px;">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{{ url_for('index') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
